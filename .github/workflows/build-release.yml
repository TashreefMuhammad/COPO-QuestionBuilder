name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package Windows installer
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoPoQuestionBuilder-Windows
          path: release/**/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.exe
          name: "CO-PO Question Builder ${{ github.ref_name }}"
          body: |
            ## Download & Run
            1. Download **CoPoQuestionBuilder Setup.exe** below
            2. Run the installer — no Python, no dependencies needed
            3. Windows SmartScreen may warn (app is unsigned) — click **More info → Run anyway**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
